# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

################
### MONITORS ###
################
source = ~/.config/hypr/monitors.conf

###################
### MY PROGRAMS ###
###################
$terminal = kitty
$fileManager = nemo
$menu = wofi --show drun --allow-images

#################
### AUTOSTART ###
#################
# --- Serviços do Sistema ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# --- Interface ---
exec-once = waybar
exec-once = nm-applet --indicator
exec-once = swaync

# --- Clipboard ---
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = clipse -listen
exec-once = wl-paste -p --watch wl-copy -pc

# --- WALLPAPER ---
exec-once = swww-daemon

# --- Temas e Cursor ---
exec-once = ~/.config/hypr/scripts/set-cursor.sh Bibata-Modern-Ice
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Bibata-Modern-Ice'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Graphite-Dark'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'

# --- Audio ---
exec-once = pactl set-default-sink alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.pro-output-0
exec-once = pactl set-sink-volume alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.pro-output-0 153%
#exec-once = amixer sset Master unmute  # <-- Remova ou comente estas linhas velhas
#exec-once = amixer sset Speaker unmute # <-- Remova
#exec-once = amixer sset Headphone unmute # <-- Remova
#exec-once = ~/.config/hypr/scripts/audio-guardian.sh &  # <-- Remova esta versão velha e complexa

# Chame o script robusto de resgate de áudio. O & é IMPORTANTE para rodar no fundo.
exec-once = ~/.config/hypr/scripts/resgata-audio.sh &

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEO_DRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GTK_THEME,Graphite-Dark
env = MOZ_ENABLE_WAYLAND,1
# --- NVIDIA & GPU PRIORITY ---
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# Força a RTX 3050 (card1) como primária e a Intel (card0) como fallback. 
# (Se o seu ls -l /dev/dri/by-path mostrou a NVIDIA como card0, inverta a ordem!)
env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0
#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 4
    gaps_out = 7
    border_size = 1
    col.active_border = rgba(a6a6a6ee) rgba(808080ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 4
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.9
    
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 10
        passes = 4
        new_optimizations = true
        ignore_opacity = true
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes

    bezier = bouncy, 0.05, 0.9, 0.1, 1.05
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,    10,   default
    animation = border,        1,    5.39,  easeOutQuint
    animation = windows,       1,    4.79,  easeOutQuint
    animation = windowsIn,     1,    6,    bouncy, slide
    animation = windowsOut,    1,    1.49,  linear, slide bottom
    animation = windowsMove,   1,    6,    bouncy
    animation = fadeIn,        1,    1.73,  almostLinear
    animation = fadeOut,       1,    1.46,  almostLinear
    animation = fade,          1,    3.03,  quick
    animation = layers,        1,    3.81,  easeOutQuint
    animation = layersIn,      1,    5,     bouncy, popin 80%
    animation = layersOut,     1,    5,     bouncy, fade
    animation = fadeLayersIn,  1,    1.79,  almostLinear
    animation = fadeLayersOut, 1,    1.39,  almostLinear
    animation = workspaces,    1,    6,      easeOutQuint, slide
    animation = zoomFactor,    1,    7,      quick
}

# --- WINDOW RULES ÚNICAS ---
windowrule {
  name = rule-clipse
  float = on
  size = 622 652
  center = on
  match:class = (clipse)
}

windowrule {
  name = rule-btop
  float = on
  center = on
  size = 800 500
  match:title = ^(btop)$
}

windowrule {
  name = rule-dashboard
  workspace = 1
  match:title = ^(dashboard_.*)$
}

windowrule {
  name = rule-dolphin-org
  opacity = 0.85 0.85
  match:class = ^(org.kde.dolphin)$
}

windowrule {
  name = rule-dolphin
  opacity = 0.85 0.85
  match:class = ^(dolphin)$
}

windowrule {
  name = rule-pavucontrol
  opacity = 0.85 0.85
  match:class = ^(pavucontrol)$
}

windowrule {
  name = rule-pavucontrol-org
  opacity = 0.85 0.85
  match:class = ^(org.pulseaudio.pavucontrol)$
}

windowrule {
  name = rule-waypaper
  opacity = 0.85 0.85
  match:class = ^(waypaper)$
}

windowrule {
  name = rule-nwglook
  opacity = 0.85 0.85
  match:class = ^(nwg-look)$
}

windowrule {
  name = rule-gnomedisks
  opacity = 0.85 0.85
  match:class = ^(gnome-disks)$
}

windowrule {
  name = rule-kitty
  opacity = 0.85 0.8
  match:class = ^(kitty)$
}

windowrule {
  name = rule-brave
  opacity = 1.0 1.0
  match:class = ^(brave-browser)$
}

windowrule {
  name = rule-nemo
  opacity = 0.10 0.1
  match:class = ^(Nemo)$
}
windowrule {
  name = rule-firefox
  opacity = 1.0 0.95
  match:class = ^(firefox)$
}
windowrule {
  name = rule-float-cava
  float = on
  size = 400 300
  move = ((monitor_w*0.05)) ((monitor_h*0.6))
  border_size = 0
  match:class = ^(float_cava)$
}

windowrule {
  name = rule-float-clock
  float = on
  size = 900 550
  move = ((monitor_w*0.5)) ((monitor_h*0.15))
  border_size = 0
  match:class = ^(float_clock)$
}

windowrule {
  name = rule-loupe
  float = on
  center = on
  size = 900 600
  match:class = ^(org.gnome.Loupe)$
}

windowrule {
  name = rule-rofi-float
  float = on
  center = on
  opacity = 1.0 1.0
  match:class = ^(rofi)$
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    disable_splash_rendering = true
    middle_click_paste = false
    vrr = 0 # 0 = desativado (estabiliza o framerate). Teste mudar para 2 (apenas em tela cheia) se for jogar.
}

#############
### INPUT ###
#############
input {
    kb_layout = br
    kb_variant = abnt2
    kb_model = abnt2
    kb_options =
    kb_rules = 
    
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, X, exec, $terminal
bind = $mainMod, Space, exec, $fileManager
bind = $mainMod, A, togglefloating,
bind = $mainMod, S, exec, rofi -show drun
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen,
# bind = $mainMod, T, exec, ~/scripts/toggle_monitor.sh
bind = $mainMod SHIFT, K, exec, systemctl poweroff
bind = $mainMod SHIFT, R, exec, systemctl reboot
bind = $mainMod SHIFT, H, exec, systemctl suspend
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, V, exec, kitty --class clipse -e clipse
bind = , XF86Launch1, exec, ~/.local/bin/nitro_perf.sh
bind = $mainMod, Escape, exec, killall waybar || waybar 
bind = SUPER, U, exec, ~/.config/hypr/scripts/audio-switch.sh
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Copiado para área de transferência"
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Copiado para área de transferência"

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod SHIFT, ´, movetoworkspace, special:magic
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = SUPER ALT, W, exec, ~/.config/hypr/scripts/toggle_widgets.sh

# --- LAYER RULES ÚNICAS ---
layerrule {
    name = layer-mako-blur
    blur = on
    ignore_alpha = 0.2
    xray = true
    match:namespace = notifications
}

layerrule {
  name = layer-waybar-blur
  blur = on
  ignore_alpha = 1
  match:namespace = waybar
}

layerrule {
  name = layer-rofi-blur
  blur = on
  ignore_alpha = 0
  match:namespace = rofi
}
layerrule {
  name = blur-swaync
  blur = on
  ignore_alpha = 0
  match:namespace = ^(swaync-control-center)$
}

layerrule {
  name = blur-swaync-notifs
  blur = on
  ignore_alpha = 0
  match:namespace = ^(swaync-notification-window)$
}
